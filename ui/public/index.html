<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      CSP: allow requests only to localhost (n8n), Jira Cloud, and OpenAI.
      Adjust connect-src if you use a self-hosted Jira on a different host.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline';
        img-src 'self' data: https:;
        connect-src 'self' http://localhost:* https://*.atlassian.net https://api.openai.com;
      "
    />
    <title>Auto Code</title>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
